<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-180x180.png" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GITCORE — Premium Dev & Site Management Hub</title>
  <meta name="description" content="GITCORE is a premium CMS hub for developers: manage GitHub repositories, Cloudflare DNS, Google Analytics, IndexNow SEO, and more in one unified dashboard." />
  <meta name="theme-color" content="#070709" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <div id="app"></div>
  <div id="toast-container" class="toast-container"></div>
  <div id="confirm-overlay" class="confirm-overlay">
    <div class="confirm-card">
      <div class="confirm-icon">
        <i data-lucide="alert-triangle"></i>
      </div>
      <h2 id="confirm-title">Are you sure?</h2>
      <p id="confirm-message">This action cannot be undone.</p>
      <div class="confirm-actions">
        <button class="btn btn-ghost" id="confirm-cancel">Cancel</button>
        <button class="btn btn-danger" id="confirm-ok">Delete</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js?v=2"></script>
</body>

</html>
